<!DOCTYPE html>
<html>
<head>
    <title>Academic Evaluation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <div class="crest">🎓</div>
        <h1>Academic Evaluation</h1>
        <p class="subtitle">Please enter the candidate's scores</p>

        <form action="/submit" method="POST">
            <div class="field">
                <label>Science</label>
                <input type="number" step="0.01" name="science" required>
            </div>
            <div class="field">
                <label>Mathematics</label>
                <input type="number" step="0.01" name="maths" required>
            </div>
            <div class="field">
                <label>Physics</label>
                <input type="number" step="0.01" name="physics" required>
            </div>
            <div class="field">
                <label>Biology</label>
                <input type="number" step="0.01" name="biology" required>
            </div>

            <button type="submit">Submit for Evaluation</button>
        </form>
    </div>
</body>
</html>
