<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="lamp-container">
        <div class="crest">🎓</div>
        <div class="bulb {{ 'on' if result == 'Success' else 'off' }}"></div>

        <h1>{{ "Distinction Achieved" if result == "Success" else "Evaluation Incomplete" }}</h1>
        <p class="subtitle">Final Verdict of the Academic Board</p>

        <div class="result-card">
            <p class="result-label">Status</p>
            <p class="result-value">{{ result }}</p>
            <hr>
            <p class="result-label">Average Score</p>
            <p class="result-value">{{ marks }}</p>
        </div>

        <a href="/" class="back-btn">Return to Form</a>
    </div>
</body>
</html>
